# ═══════════════════════════════════════════════════════════
# Code Typist Arcade — PostgreSQL Container
# Run: docker-compose up -d
# ═══════════════════════════════════════════════════════════

services:
  postgres:
    image: postgres:16-alpine
    container_name: code-typist-db
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: codetypist
      POSTGRES_PASSWORD: codetypist_dev_2024
      POSTGRES_DB: code_typist_arcade
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U codetypist -d code_typist_arcade']
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
